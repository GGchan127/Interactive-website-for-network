<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cisco Command Reference — Network Fundamentals</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1e2430;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #1f6feb;
    --accent2: #388bfd;
    --green: #3fb950;
    --yellow: #d29922;
    --orange: #f0883e;
    --red: #f85149;
    --purple: #bc8cff;
    --cyan: #39c5cf;
    --tag-bg: #21262d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1a2332 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 20px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-icon {
    width: 40px; height: 40px; background: var(--accent);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .brand-title { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .brand-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .stats { display: flex; gap: 16px; }
  .stat { text-align: center; }
  .stat-num { font-size: 20px; font-weight: 700; color: var(--accent2); }
  .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── SEARCH & FILTER ── */
  .controls {
    margin-top: 16px;
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
  #searchInput {
    width: 100%; padding: 8px 12px 8px 34px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px; outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus { border-color: var(--accent2); }
  #searchInput::placeholder { color: var(--text-muted); }

  .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--tag-bg); color: var(--text-muted); font-size: 12px;
    cursor: pointer; transition: all 0.15s; user-select: none; font-weight: 500;
  }
  .filter-btn:hover { border-color: var(--accent2); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── MAIN LAYOUT ── */
  main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }

  .section-title {
    font-size: 13px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-muted);
    margin: 28px 0 12px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ── COMMAND GRID ── */
  .cmd-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 10px;
  }

  .cmd-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    transition: border-color 0.15s, transform 0.1s;
    cursor: default;
    position: relative;
  }
  .cmd-card:hover { border-color: var(--accent2); transform: translateY(-1px); }
  .cmd-card.hidden { display: none; }

  .cmd-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .cmd-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag {
    font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .tag-switch  { background: rgba(63,185,80,0.15);  color: var(--green);  border: 1px solid rgba(63,185,80,0.3); }
  .tag-router  { background: rgba(31,111,235,0.15); color: var(--accent2); border: 1px solid rgba(56,139,253,0.3); }
  .tag-bgp     { background: rgba(188,140,255,0.15);color: var(--purple); border: 1px solid rgba(188,140,255,0.3); }
  .tag-mpls    { background: rgba(240,136,62,0.15); color: var(--orange); border: 1px solid rgba(240,136,62,0.3); }
  .tag-vlan    { background: rgba(57,197,207,0.15); color: var(--cyan);   border: 1px solid rgba(57,197,207,0.3); }
  .tag-show    { background: rgba(210,153,34,0.15); color: var(--yellow); border: 1px solid rgba(210,153,34,0.3); }
  .tag-config  { background: rgba(248,81,73,0.15);  color: var(--red);    border: 1px solid rgba(248,81,73,0.3); }
  .tag-ospf    { background: rgba(63,185,80,0.1);   color: #79c0ff;       border: 1px solid rgba(121,192,255,0.3); }

  .copy-btn {
    background: none; border: 1px solid transparent; color: var(--text-muted);
    border-radius: 5px; padding: 3px 7px; font-size: 11px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .copy-btn:hover { border-color: var(--border); color: var(--text); background: var(--surface2); }
  .copy-btn.copied { color: var(--green); border-color: var(--green); }

  .cmd-code {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 12.5px; color: var(--cyan);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; padding: 8px 12px;
    white-space: pre-wrap; word-break: break-all;
    margin-bottom: 8px; line-height: 1.6;
  }
  .cmd-code .kw  { color: #ff7b72; }
  .cmd-code .val { color: #a5d6ff; }
  .cmd-code .cmt { color: #8b949e; font-style: italic; }
  .cmd-code .num { color: #79c0ff; }

  .cmd-desc { font-size: 12.5px; color: var(--text-muted); line-height: 1.5; }
  .cmd-desc strong { color: var(--text); }
  .cmd-module { font-size: 10px; color: #484f58; margin-top: 6px; }

  /* ── MODE BADGE ── */
  .mode-badge {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 1px 6px; border-radius: 4px; margin-bottom: 4px;
    font-family: monospace;
  }
  .mode-priv   { background: rgba(248,81,73,0.12);  color: #f85149; }
  .mode-global { background: rgba(63,185,80,0.12);  color: #3fb950; }
  .mode-if     { background: rgba(57,197,207,0.12); color: #39c5cf; }
  .mode-vlan   { background: rgba(188,140,255,0.12);color: #bc8cff; }
  .mode-router { background: rgba(31,111,235,0.12); color: #388bfd; }

  /* ── NO RESULTS ── */
  #noResults {
    display: none; text-align: center; padding: 60px 20px;
    color: var(--text-muted); font-size: 15px;
  }
  #noResults span { font-size: 40px; display: block; margin-bottom: 12px; }

  /* ── FOOTER ── */
  footer {
    text-align: center; padding: 24px;
    color: #484f58; font-size: 11px; border-top: 1px solid var(--border);
    margin-top: 40px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    header { padding: 16px; }
    main { padding: 16px; }
    .cmd-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<header>

      <div class="brand-icon">⌨</div>

        <div class="brand-title">Cisco IOS Command Reference</div>

// ── MODE LABEL MAP ────────────────────────────────────────────────────────────
const modeLabel = {
  priv:   { cls: "mode-priv",   text: "Privileged EXEC  #" },
  global: { cls: "mode-global", text: "Global Config  (config)#" },
  if:     { cls: "mode-if",     text: "Interface Config  (config-if)#" },
  vlan:   { cls: "mode-vlan",   text: "VLAN Config  (config-vlan)#" },
  router: { cls: "mode-router", text: "Router Config  (config-router)#" },
};

// ── RENDER ────────────────────────────────────────────────────────────────────
function buildTagHTML(tags) {
  return tags.map(t => {
    const cls = {
      switch:"tag-switch", router:"tag-router", bgp:"tag-bgp",
      mpls:"tag-mpls", vlan:"tag-vlan", show:"tag-show",
      config:"tag-config", ospf:"tag-ospf"
    }[t] || "tag-show";
    return `<span class="tag ${cls}">${t}</span>`;
  }).join('');
}

function render(list) {
  const container = document.getElementById('cmdContainer');
  container.innerHTML = '';

  // Group by section
  const sections = {};
  list.forEach(c => {
    if (!sections[c.section]) sections[c.section] = [];
    sections[c.section].push(c);
  });

  if (list.length === 0) {
    document.getElementById('noResults').style.display = 'block';
    document.getElementById('visibleCount').textContent = 0;
    return;
  }
  document.getElementById('noResults').style.display = 'none';
  document.getElementById('visibleCount').textContent = list.length;

  Object.entries(sections).forEach(([sec, cmds]) => {
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = sec;
    container.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'cmd-grid';

    cmds.forEach((c, i) => {
      const m = modeLabel[c.mode] || modeLabel.priv;
      const card = document.createElement('div');
      card.className = 'cmd-card';
      card.innerHTML = `
        <div class="cmd-header">
          <div class="cmd-tags">${buildTagHTML(c.tags)}</div>
          <button class="copy-btn" onclick="copyCmd(this, \`${c.raw.replace(/`/g,'\\`')}\`)">Copy</button>
        </div>
        <span class="mode-badge ${m.cls}">${m.text}</span>
        <div class="cmd-code">${c.cmd}</div>
        <div class="cmd-desc">${c.desc}</div>
        <div class="cmd-module">📘 ${c.module}</div>
      `;
      grid.appendChild(card);
    });
    container.appendChild(grid);
  });
}

// ── COPY ──────────────────────────────────────────────────────────────────────
function copyCmd(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

// ── FILTER & SEARCH ───────────────────────────────────────────────────────────
let activeFilter = 'all';

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return commands.filter(c => {
    const matchFilter = activeFilter === 'all' || c.tags.includes(activeFilter);
    const matchSearch = !q ||
      c.raw.toLowerCase().includes(q) ||
      c.desc.toLowerCase().includes(q) ||
      c.section.toLowerCase().includes(q) ||
      c.module.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render(applyFilters());
  });
});

document.getElementById('searchInput').addEventListener('input', () => render(applyFilters()));

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('totalCount').textContent = commands.length;
render(commands);
</script>
