<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Module 14 — Basic BGP</title><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0f1117;--paper:#f5f2eb;--cream:#ede9df;--rust:#c94a2a;--rust-light:rgba(201,74,42,0.08);--blue:#1a3a6b;--blue-light:#e8eef8;--gold:#d4a039;--green:#2a6b3a;--green-light:#e8f5eb;--muted:#6b6560;--border:#d0cab8;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--paper);color:var(--ink);font-family:"DM Sans",sans-serif;line-height:1.7;}
body::before{content:"";position:fixed;inset:0;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:999;}
#course-navbar{position:sticky;top:0;z-index:9999;background:#0f1117;border-bottom:3px solid #c94a2a;display:flex;align-items:center;height:52px;position:relative;}
#course-navbar a{text-decoration:none;}
.cnav-home{padding:0 1.2rem;font-family:"Bebas Neue",sans-serif;font-size:1rem;letter-spacing:1.5px;color:#d4a039;height:52px;display:flex;align-items:center;border-right:1px solid rgba(255,255,255,.1);}
.cnav-home:hover{background:rgba(212,160,57,.1);}
.cnav-module{padding:0 1rem;font-family:"DM Mono",monospace;font-size:.68rem;letter-spacing:1px;color:rgba(255,255,255,.45);flex:1;}
.cnav-module strong{color:#fff;font-family:"Bebas Neue",sans-serif;font-size:.9rem;letter-spacing:1px;}
.cnav-progress{height:3px;background:#c94a2a;position:absolute;bottom:0;left:0;}
.cnav-arrow{padding:0 1rem;font-family:"Bebas Neue",sans-serif;font-size:.85rem;letter-spacing:1px;color:rgba(255,255,255,.5);height:52px;display:flex;align-items:center;border-left:1px solid rgba(255,255,255,.1);}
.cnav-arrow:hover{color:#fff;background:rgba(255,255,255,.05);}
.cnav-next{background:#c94a2a;color:#fff !important;}.cnav-next:hover{background:#a83a1e !important;}
.hero{background:var(--ink);color:#fff;padding:4rem 3rem 3rem;position:relative;overflow:hidden;}
.hero-kicker{font-family:"DM Mono",monospace;font-size:.7rem;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:.8rem;}
.hero h1{font-family:"Bebas Neue",sans-serif;font-size:clamp(2.5rem,6vw,4.5rem);line-height:.95;letter-spacing:2px;margin-bottom:1rem;}
.hero h1 em{font-style:normal;color:var(--rust);}
.hero p{color:#9a9590;font-size:.95rem;font-weight:300;max-width:560px;margin-bottom:1.2rem;}
.hero-date{display:inline-flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:2px;padding:.3rem .9rem;font-family:"DM Mono",monospace;font-size:.72rem;color:#aaa;}
.prog-wrap{margin-top:1.2rem;background:rgba(255,255,255,.1);border-radius:2px;height:3px;}
.prog-bar{height:3px;background:var(--rust);border-radius:2px;}
.sec{max-width:960px;margin:0 auto;padding:2.5rem 3rem;}
.sec-hdr{display:flex;align-items:baseline;gap:1rem;margin-bottom:1.2rem;}
.sec-num{font-family:"Bebas Neue",sans-serif;font-size:3.5rem;color:var(--border);line-height:1;flex-shrink:0;}
.sec-tag{font-family:"DM Mono",monospace;font-size:.65rem;color:var(--rust);letter-spacing:2px;text-transform:uppercase;margin-bottom:.2rem;}
.sec-title{font-family:"Bebas Neue",sans-serif;font-size:1.8rem;letter-spacing:.5px;}
.lead{color:var(--muted);max-width:680px;margin-bottom:1rem;font-size:.93rem;}
.lead strong{color:var(--ink);}
.gif-wrap{border:2px solid var(--border);border-radius:4px;overflow:hidden;margin:1.2rem 0;}
.gif-hdr{background:var(--ink);color:var(--gold);padding:.5rem 1rem;font-family:"Bebas Neue",sans-serif;font-size:.82rem;letter-spacing:2px;display:flex;align-items:center;gap:.5rem;}
.gif-hdr::before{content:"▶";color:var(--rust);font-size:.65rem;}
.gif-stage{padding:1.5rem;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
.card{background:var(--cream);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.card-head{padding:.7rem 1.2rem;font-family:"Bebas Neue",sans-serif;font-size:1rem;letter-spacing:1.5px;color:#fff;}
.card-head.blue{background:var(--blue);}.card-head.rust{background:var(--rust);}.card-head.green{background:var(--green);}
.card-body{padding:1.1rem;font-size:.87rem;color:var(--muted);line-height:1.6;}
.card-body strong{color:var(--ink);}
.note{font-family:"DM Mono",monospace;font-size:.78rem;color:var(--muted);padding:.8rem 1rem;border:1px solid var(--border);border-left:3px solid var(--gold);margin:.8rem 0;line-height:1.6;}
.note strong{color:var(--rust);}.note.blue{border-left-color:var(--blue);}.note.green{border-left-color:var(--green);}
.kp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.8rem;margin:1rem 0;}
.kp{background:var(--cream);border:1px solid var(--border);border-radius:3px;padding:1rem;font-size:.87rem;display:flex;gap:.7rem;}
.kp-dot{width:6px;height:6px;border-radius:50%;background:var(--rust);flex-shrink:0;margin-top:.55rem;}
.kp-dot.blue{background:var(--blue);}.kp-dot.green{background:var(--green);}
.ref-table{width:100%;border-collapse:collapse;font-size:.85rem;}
.ref-table th{background:var(--ink);color:#fff;font-family:"Bebas Neue",sans-serif;font-size:.9rem;letter-spacing:1.5px;padding:.7rem 1rem;text-align:left;}
.ref-table td{padding:.7rem 1rem;border-bottom:1px solid var(--border);font-family:"DM Mono",monospace;font-size:.82rem;}
.ref-table tr:nth-child(even) td{background:rgba(0,0,0,.03);}.hl{color:var(--rust);font-weight:600;}
.pdf-sec{background:var(--cream);border:1px solid var(--border);border-radius:6px;padding:2rem;margin:2rem 0;}
.pdf-sec-title{font-family:"Bebas Neue",sans-serif;font-size:1rem;letter-spacing:2px;color:var(--rust);margin-bottom:1.5rem;}
.pdf-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.pdf-fig{margin:0;}
.pdf-cap{font-family:"DM Mono",monospace;font-size:.68rem;color:var(--muted);margin-top:.4rem;text-align:center;display:block;}
.pdf-pre{font-family:"DM Mono",monospace;font-size:.73rem;color:var(--muted);line-height:1.6;white-space:pre-wrap;word-break:break-word;background:var(--paper);border:1px solid var(--border);border-left:3px solid var(--blue);padding:1rem;border-radius:3px;margin-top:1rem;}
.bottom-nav{display:flex;justify-content:space-between;align-items:center;padding:2rem 3rem 3rem;border-top:1px solid var(--border);flex-wrap:wrap;gap:1rem;max-width:960px;margin:0 auto;}
.bnav-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.6rem 1.4rem;border:1px solid var(--border);border-radius:2px;text-decoration:none;font-family:"Bebas Neue",sans-serif;font-size:.95rem;letter-spacing:1px;color:var(--ink);background:var(--paper);transition:all .2s;}
.bnav-btn:hover{border-color:var(--rust);color:var(--rust);}
.bnav-next{background:var(--rust);color:#fff !important;border-color:var(--rust);}.bnav-next:hover{background:#a83a1e !important;}
.bnav-home{background:var(--ink);color:#fff !important;border-color:var(--ink);}.bnav-home:hover{background:#222 !important;}
footer{background:var(--ink);color:#555;padding:1.5rem 3rem;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #222;font-family:"DM Mono",monospace;font-size:.7rem;margin-top:2rem;}
.footer-brand{font-family:"Bebas Neue",sans-serif;font-size:1rem;letter-spacing:2px;color:#333;}
.footer-brand em{color:var(--rust);font-style:normal;}
@media(max-width:768px){.two-col,.three-col,.pdf-grid{grid-template-columns:1fr;}.sec{padding:1.5rem;}.bottom-nav{padding:1.5rem;}}
</style></head><body>
